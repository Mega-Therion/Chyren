version: '3.8'

services:
  # OmegA-Next API (Rust)
  chyren-api:
    build:
      context: ./omega_workspace/workspace/OmegA-Next
      dockerfile: Dockerfile.api
    container_name: chyren-api
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - OMEGA_DB_URL=postgresql://chyren:chyren_password@postgres:5432/chyren
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chyren-network
    restart: unless-stopped

  # Chyren Web (Next.js)
  chyren-web:
    build:
      context: ./omega_workspace/workspace/OmegA-Next/chyren-web
      dockerfile: Dockerfile
    container_name: chyren-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - CHYREN_API_URL=http://chyren-api:8080/api/chat
    depends_on:
      - chyren-api
    networks:
      - chyren-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: chyren-postgres
    environment:
      - POSTGRES_DB=chyren
      - POSTGRES_USER=chyren
      - POSTGRES_PASSWORD=chyren_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - chyren-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chyren"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chyren-redis
    networks:
      - chyren-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chyren-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - chyren-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: chyren-prometheus
    volumes:
      - ./.docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - chyren-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional entry point)
  nginx:
    image: nginx:alpine
    container_name: chyren-nginx
    ports:
      - "80:80"
    volumes:
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - chyren-network
    restart: unless-stopped
    depends_on:
      - chyren-api
      - chyren-web

volumes:
  postgres-data:
  qdrant-data:
  prometheus-data:

networks:
  chyren-network:
    driver: bridge
