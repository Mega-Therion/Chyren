name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Extract section between this version and the previous one
          awk "/^## \[${VERSION//v/}\]/,/^## \[/" CHANGELOG.md | head -n -1 > release_notes.txt
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Rust binaries
        working-directory: omega_workspace/workspace/OmegA-Next
        run: |
          cargo build --workspace --release
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Chyren ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Chyren ${{ steps.version.outputs.VERSION }} — Sovereign Intelligence Release

            ${{ steps.changelog.outputs.NOTES }}

            ---
            **Verification:** All commits in this release are Yettragrammaton-signed.
            **ADCCL:** Threshold maintained at 0.7.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true
