version: "3.9"

services:
  # The Sovereign Intelligence Hub (Rust)
  chyren-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      CHYREN_API_HOST: "0.0.0.0"
      CHYREN_API_PORT: "8080"
      OMEGA_DB_URL: "postgres://chyren:omega_pass@chyren-db:5432/ledger"
      QDRANT_URL: "http://chyren-myelin:6334"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    depends_on:
      chyren-db:
        condition: service_healthy
      chyren-myelin:
        condition: service_started

  # The Cognitive Interface (Next.js)
  chyren-web:
    build:
      context: ../chyren-os/interface
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      CHYREN_API_URL: "http://chyren-api:8080"
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - chyren-api

  # The Master Ledger (Postgres)
  chyren-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chyren
      POSTGRES_PASSWORD: omega_pass
      POSTGRES_DB: ledger
    volumes:
      - chyren_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chyren -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Recursive Memory Store (Qdrant)
  chyren-myelin:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - chyren_memory_data:/qdrant/storage

volumes:
  chyren_db_data:
  chyren_memory_data:

networks:
  default:
    name: chyren-network
