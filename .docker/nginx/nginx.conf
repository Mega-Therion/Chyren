worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;

    upstream chyren-api {
        server chyren-api:8080;
    }

    upstream chyren-web {
        server chyren-web:3000;
    }

    server {
        listen 80;

        # API
        location /api/ {
            proxy_pass http://chyren-api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Web
        location / {
            proxy_pass http://chyren-web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
