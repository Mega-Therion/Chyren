name: Chyren Web CI

on:
  push:
    branches: [main]
    paths:
      - 'omega_workspace/workspace/OmegA-Next/chyren-web/**'
  pull_request:
    branches: [main]
    paths:
      - 'omega_workspace/workspace/OmegA-Next/chyren-web/**'

defaults:
  run:
    working-directory: omega_workspace/workspace/OmegA-Next/chyren-web

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: omega_workspace/workspace/OmegA-Next/chyren-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: omega_workspace/workspace/OmegA-Next/chyren-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known CVEs
        run: npx better-npm-audit audit --level high
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      # Stub secrets so the build doesn't fail in CI
      NEON_DATABASE_URL: postgresql://ci:ci@localhost/ci
      GROQ_API_KEY: gsk_ci_placeholder
      OPENAI_API_KEY: sk-ci_placeholder
      ANTHROPIC_API_KEY: sk-ant-ci_placeholder
      GOOGLE_AI_API_KEY: ci_placeholder
      FIREBASE_SERVICE_ACCOUNT: '{}'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: omega_workspace/workspace/OmegA-Next/chyren-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: omega_workspace/workspace/OmegA-Next/chyren-web/.next
          retention-days: 1
