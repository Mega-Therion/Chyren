version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      CHYREN_API_HOST: "0.0.0.0"
      CHYREN_API_PORT: "8080"

  web:
    build:
      context: ./chyren-web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    depends_on:
      - api
