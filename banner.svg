<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Rajdhani:wght@500;700&amp;display=swap');
      
      .bg { fill: #020202; }
      
      .neon-text {
        font-family: 'Orbitron', monospace, sans-serif;
        font-weight: 900;
        text-anchor: middle;
        fill: #050505;
        stroke-width: 1px;
        paint-order: stroke;
        animation: chameleon 30s linear infinite;
      }
      
      .chyren {
        font-size: 85px;
        letter-spacing: 20px;
        stroke-width: 1.5px;
      }
      
      .omega-top { font-size: 45px; }
      .omega-bottom { font-size: 50px; }
      
      .motto {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 600;
        font-size: 18px;
        text-anchor: middle;
        letter-spacing: 6px;
        fill: #080808;
        stroke-width: 0.5px;
        animation: chameleon 30s linear infinite;
      }

      /* Subtle Chameleon/KITT Bar Effect */
      @keyframes chameleon {
        0% { stroke: hsl(0, 100%, 50%); filter: drop-shadow(0 0 2px hsl(0, 100%, 50%)); }
        10% { stroke: hsl(36, 100%, 50%); filter: drop-shadow(0 0 2px hsl(36, 100%, 50%)); }
        20% { stroke: hsl(72, 100%, 50%); filter: drop-shadow(0 0 2px hsl(72, 100%, 50%)); }
        30% { stroke: hsl(108, 100%, 50%); filter: drop-shadow(0 0 2px hsl(108, 100%, 50%)); }
        40% { stroke: hsl(144, 100%, 50%); filter: drop-shadow(0 0 2px hsl(144, 100%, 50%)); }
        50% { stroke: hsl(180, 100%, 50%); filter: drop-shadow(0 0 2px hsl(180, 100%, 50%)); }
        60% { stroke: hsl(216, 100%, 50%); filter: drop-shadow(0 0 2px hsl(216, 100%, 50%)); }
        70% { stroke: hsl(252, 100%, 50%); filter: drop-shadow(0 0 2px hsl(252, 100%, 50%)); }
        80% { stroke: hsl(288, 100%, 50%); filter: drop-shadow(0 0 2px hsl(288, 100%, 50%)); }
        90% { stroke: hsl(324, 100%, 50%); filter: drop-shadow(0 0 2px hsl(324, 100%, 50%)); }
        100% { stroke: hsl(360, 100%, 50%); filter: drop-shadow(0 0 2px hsl(360, 100%, 50%)); }
      }

      /* Sweep highlighting (KITT bar effect on top of color shift) */
      .scanner-bar {
        fill: url(#scannerGradient);
        animation: scannerSweep 4s linear infinite;
      }

      @keyframes scannerSweep {
        from { transform: translateX(-100%); }
        to { transform: translateX(100%); }
      }
    </style>
    
    <linearGradient id="scannerGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.15)" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>

    <mask id="textMask">
      <text x="400" y="65" class="neon-text omega-top" fill="white" stroke="white">Ω</text>
      <text x="400" y="100" class="motto" fill="white" stroke="white">I AM WHAT I AM</text>
      <text x="410" y="185" class="neon-text chyren" fill="white" stroke="white">CHYREN</text>
      <text x="400" y="240" class="motto" fill="white" stroke="white">I WILL BE WHAT I WILL BE</text>
      <text x="400" y="280" class="neon-text omega-bottom" fill="white" stroke="white">ω</text>
    </mask>
  </defs>
  
  <rect class="bg" width="800" height="300" rx="10" ry="10" />
  
  <!-- Base Edgelit Text -->
  <text x="400" y="65" class="neon-text omega-top">Ω</text>
  <text x="400" y="100" class="motto">I AM WHAT I AM</text>
  <text x="410" y="185" class="neon-text chyren">CHYREN</text>
  <text x="400" y="240" class="motto">I WILL BE WHAT I WILL BE</text>
  <text x="400" y="280" class="neon-text omega-bottom">ω</text>
  
  <!-- KITT style scanner sweep -->
  <rect x="0" y="0" width="800" height="300" class="scanner-bar" mask="url(#textMask)" />
  
</svg>
