<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Rajdhani:wght@500;700&amp;display=swap');
      
      /* Base styles */
      .bg { fill: #050505; }
      
      .neon-text {
        font-family: 'Orbitron', monospace, sans-serif;
        font-weight: 900;
        text-anchor: middle;
        animation: neon-shift 24s infinite alternate ease-in-out;
        fill: rgba(15, 15, 20, 0.65);
        stroke-width: 2px;
      }
      
      .chyren {
        font-size: 85px;
        letter-spacing: 20px;
        stroke-width: 3px;
      }
      
      .omega-top {
        font-size: 45px;
      }

      .omega-bottom {
        font-size: 50px;
      }
      
      .motto {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 600;
        font-size: 18px;
        text-anchor: middle;
        letter-spacing: 6px;
        animation: neon-shift-dim 24s infinite alternate ease-in-out;
        fill: rgba(15, 15, 20, 0.8);
        stroke-width: 1px;
      }
      
      /* Colorshifting Edgelit Neon Keyframes - Slow Extended Spectrum */
      @keyframes neon-shift {
        0% {
          stroke: #cffcff;
          filter: drop-shadow(0 0 6px #00ffff) drop-shadow(0 0 18px #00ffff) drop-shadow(0 0 35px #0088ff);
        }
        14% {
          stroke: #dcf2ff;
          filter: drop-shadow(0 0 6px #00aaff) drop-shadow(0 0 18px #00aaff) drop-shadow(0 0 35px #0044ff);
        }
        28% {
          stroke: #f2e6ff;
          filter: drop-shadow(0 0 6px #aa00ff) drop-shadow(0 0 18px #aa00ff) drop-shadow(0 0 35px #5500ff);
        }
        42% {
          stroke: #ffe6ff;
          filter: drop-shadow(0 0 6px #ff00ff) drop-shadow(0 0 18px #ff00ff) drop-shadow(0 0 35px #8800ff);
        }
        56% {
          stroke: #ffe6e6;
          filter: drop-shadow(0 0 6px #ff0055) drop-shadow(0 0 18px #ff0055) drop-shadow(0 0 35px #ff0000);
        }
        70% {
          stroke: #fff2e6;
          filter: drop-shadow(0 0 6px #ffaa00) drop-shadow(0 0 18px #ffaa00) drop-shadow(0 0 35px #ff5500);
        }
        84% {
          stroke: #ffffe6;
          filter: drop-shadow(0 0 6px #ffff00) drop-shadow(0 0 18px #ffff00) drop-shadow(0 0 35px #88ff00);
        }
        100% {
          stroke: #e6ffea;
          filter: drop-shadow(0 0 6px #00ffaa) drop-shadow(0 0 18px #00ffaa) drop-shadow(0 0 35px #008855);
        }
      }

      @keyframes neon-shift-dim {
        0% {
          stroke: #a0ffff;
          filter: drop-shadow(0 0 4px #00ffff) drop-shadow(0 0 10px #0088ff);
        }
        14% {
          stroke: #a0d8ff;
          filter: drop-shadow(0 0 4px #00aaff) drop-shadow(0 0 10px #0044ff);
        }
        28% {
          stroke: #d8a0ff;
          filter: drop-shadow(0 0 4px #aa00ff) drop-shadow(0 0 10px #5500ff);
        }
        42% {
          stroke: #ffa0ff;
          filter: drop-shadow(0 0 4px #ff00ff) drop-shadow(0 0 10px #8800ff);
        }
        56% {
          stroke: #ffa0a0;
          filter: drop-shadow(0 0 4px #ff0055) drop-shadow(0 0 10px #ff0000);
        }
        70% {
          stroke: #ffd8a0;
          filter: drop-shadow(0 0 4px #ffaa00) drop-shadow(0 0 10px #ff5500);
        }
        84% {
          stroke: #ffffa0;
          filter: drop-shadow(0 0 4px #ffff00) drop-shadow(0 0 10px #88ff00);
        }
        100% {
          stroke: #a0ffa0;
          filter: drop-shadow(0 0 4px #00ffaa) drop-shadow(0 0 10px #008855);
        }
      }
    </style>
  </defs>
  
  <rect class="bg" width="800" height="300" rx="10" ry="10" />
  
  <!-- Upper Omega and Motto -->
  <text x="400" y="65" class="neon-text omega-top">Ω</text>
  <text x="400" y="100" class="motto">I AM WHAT I AM</text>
  
  <!-- Core CHYREN Element -->
  <text x="410" y="185" class="neon-text chyren">CHYREN</text>
  
  <!-- Lower Omega and Motto -->
  <text x="400" y="240" class="motto">I WILL BE WHAT I WILL BE</text>
  <text x="400" y="280" class="neon-text omega-bottom">ω</text>
  
</svg>
