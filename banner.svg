<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Cinzel:wght@700&amp;display=swap');
      
      .bg { fill: #010101; }
      
      .main-neon {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        fill: #050505;
        stroke-width: 1.5px;
        paint-order: stroke;
        animation: color-cycle 30s linear infinite;
      }
      
      .ancient-text {
        font-family: 'Cinzel', serif;
        font-weight: 700;
        fill: #050505;
        stroke-width: 0.8px;
        paint-order: stroke;
        animation: inverse-color-cycle 30s linear infinite;
      }

      /* Background Symbol */
      .omega-bg {
        font-size: 280px;
        opacity: 0.12;
        stroke-width: 1.5px;
        text-anchor: middle;
      }

      /* Character sizes */
      .text-char { font-size: 85px; text-anchor: middle; }
      .symbol-char { font-size: 85px; text-anchor: middle; font-family: 'Cinzel', serif; }
      
      @keyframes color-cycle {
        0% { stroke: hsl(0, 100%, 50%); filter: drop-shadow(0 0 4px hsl(0, 100%, 50%)); }
        50% { stroke: hsl(180, 100%, 50%); filter: drop-shadow(0 0 4px hsl(180, 100%, 50%)); }
        100% { stroke: hsl(360, 100%, 50%); filter: drop-shadow(0 0 4px hsl(360, 100%, 50%)); }
      }

      @keyframes inverse-color-cycle {
        0% { stroke: hsl(180, 100%, 50%); filter: drop-shadow(0 0 4px hsl(180, 100%, 50%)); }
        50% { stroke: hsl(360, 100%, 50%); filter: drop-shadow(0 0 4px hsl(360, 100%, 50%)); }
        100% { stroke: hsl(540, 100%, 50%); filter: drop-shadow(0 0 4px hsl(540, 100%, 50%)); }
      }

      .scanner-bar {
        fill: url(#scannerGradient);
        animation: scannerSweep 8s linear infinite;
      }

      @keyframes scannerSweep {
        from { transform: translateX(-100%); }
        to { transform: translateX(100%); }
      }
    </style>
    
    <linearGradient id="scannerGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>

    <mask id="textMask">
      <text x="400" y="240" class="ancient-text omega-bg" fill="white" stroke="white">Ω</text>
      <g fill="white" stroke="white">
        <!-- Ω rotated to look like C (opening right) -->
        <text x="145" y="165" class="symbol-char" transform="rotate(-90, 145, 145)">Ω</text>
        <text x="250" y="165" class="main-neon text-char">H</text>
        <text x="355" y="165" class="main-neon text-char">Y</text>
        <text x="460" y="165" class="main-neon text-char">R</text>
        <!-- ω rotated to look like E (legs facing left) -->
        <text x="565" y="165" class="symbol-char" transform="rotate(90, 565, 165)">ω</text>
        <text x="670" y="165" class="main-neon text-char">N</text>
      </g>
    </mask>
  </defs>
  
  <rect class="bg" width="800" height="300" rx="6" ry="6" />
  
  <!-- Content Layers -->
  <text x="400" y="240" class="ancient-text omega-bg">Ω</text>
  
  <!-- Custom CHYREN with symbols -->
  <g class="main-neon">
    <!-- C (Omega rotated -90) -->
    <text x="145" y="165" class="symbol-char" transform="rotate(-90, 145, 155)">Ω</text>
    <!-- Standard -->
    <text x="250" y="165" class="text-char">H</text>
    <text x="355" y="165" class="text-char">Y</text>
    <text x="460" y="165" class="text-char">R</text>
    <!-- E (omega rotated 90) -->
    <text x="565" y="165" class="symbol-char" transform="rotate(90, 565, 155)">ω</text>
    <!-- Standard -->
    <text x="670" y="165" class="text-char">N</text>
  </g>
  
  <rect x="0" y="0" width="800" height="300" class="scanner-bar" mask="url(#textMask)" />
  
</svg>
