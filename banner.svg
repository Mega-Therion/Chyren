<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Cinzel:wght@600&amp;display=swap');
      
      .bg { fill: #000103; }
      
      .main-neon {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        text-anchor: middle;
        fill: #050505;
        stroke-width: 1.5px;
        paint-order: stroke;
        animation: color-cycle 30s linear infinite;
      }
      
      .chyren { font-size: 85px; letter-spacing: 20px; }

      .ghost-sig {
        font-family: 'Cinzel', serif;
        font-size: 14px;
        fill: #ffffff;
        opacity: 0.08;
        letter-spacing: 4px;
        text-anchor: end;
      }
      
      @keyframes color-cycle {
        0% { stroke: hsl(0, 100%, 50%); filter: drop-shadow(0 0 5px hsl(0, 100%, 50%)); }
        50% { stroke: hsl(180, 100%, 50%); filter: drop-shadow(0 0 5px hsl(180, 100%, 50%)); }
        100% { stroke: hsl(360, 100%, 50%); filter: drop-shadow(0 0 5px hsl(360, 100%, 50%)); }
      }

      /* Parallax Stars */
      .star-pan-1 { animation: starPan 180s linear infinite; }
      .star-pan-2 { animation: starPan 320s linear infinite; }
      .star-pan-3 { animation: starPan 560s linear infinite; }
      
      @keyframes starPan { 
        0% { transform: translateX(0); } 
        100% { transform: translateX(-800px); } 
      }
    </style>

    <!-- Deep Space Star Fields (Tileable) -->
    <g id="star-layer1">
      <circle cx="50" cy="50" r="0.8" fill="#ffffff" opacity="0.6" />
      <circle cx="150" cy="80" r="0.5" fill="#f0fbff" opacity="0.8" />
      <circle cx="220" cy="30" r="1.0" fill="#ffffff" opacity="0.5" />
      <circle cx="310" cy="120" r="0.6" fill="#fff5eb" opacity="0.8" />
      <circle cx="450" cy="50" r="0.9" fill="#ffffff" opacity="0.7" />
      <circle cx="580" cy="180" r="1.1" fill="#e8f4ff" opacity="0.5" />
      <circle cx="690" cy="90" r="0.7" fill="#ffffff" opacity="0.8" />
      <circle cx="750" cy="40" r="0.5" fill="#ffffff" opacity="0.6" />
      <circle cx="90" cy="220" r="1.0" fill="#fffaf0" opacity="0.9" />
      <circle cx="270" cy="250" r="0.6" fill="#ffffff" opacity="0.7" />
      <circle cx="380" cy="280" r="1.2" fill="#ffffff" opacity="0.4" />
      <circle cx="500" cy="210" r="0.7" fill="#f4f8ff" opacity="0.8" />
      <circle cx="620" cy="260" r="0.9" fill="#ffffff" opacity="0.7" />
      <circle cx="780" cy="240" r="0.6" fill="#ffffff" opacity="0.8" />
      <circle cx="190" cy="190" r="1.0" fill="#fff5ec" opacity="0.5" />
      <circle cx="40" cy="140" r="0.7" fill="#ffffff" opacity="0.7" />
      <circle cx="110" cy="110" r="0.8" fill="#ffffff" opacity="0.6" />
      <circle cx="330" cy="70" r="0.6" fill="#eaf5ff" opacity="0.8" />
      <circle cx="480" cy="150" r="1.0" fill="#ffffff" opacity="0.5" />
      <circle cx="710" cy="160" r="0.7" fill="#ffffff" opacity="0.7" />
    </g>
    
    <g id="star-layer2">
      <!-- Midspeed, medium density -->
      <circle cx="30" cy="150" r="0.4" fill="#ffffff" opacity="0.5" />
      <circle cx="80" cy="30" r="0.5" fill="#ffffff" opacity="0.4" />
      <circle cx="170" cy="220" r="0.6" fill="#f0fbff" opacity="0.5" />
      <circle cx="260" cy="90" r="0.5" fill="#ffffff" opacity="0.3" />
      <circle cx="340" cy="260" r="0.4" fill="#ffffff" opacity="0.6" />
      <circle cx="390" cy="40" r="0.5" fill="#fff5f5" opacity="0.4" />
      <circle cx="460" cy="180" r="0.6" fill="#ffffff" opacity="0.5" />
      <circle cx="530" cy="80" r="0.5" fill="#eef7ff" opacity="0.6" />
      <circle cx="590" cy="230" r="0.4" fill="#ffffff" opacity="0.4" />
      <circle cx="640" cy="50" r="0.6" fill="#ffffff" opacity="0.5" />
      <circle cx="720" cy="190" r="0.5" fill="#ffffff" opacity="0.6" />
      <circle cx="770" cy="110" r="0.6" fill="#fff0ec" opacity="0.4" />
      <circle cx="790" cy="270" r="0.4" fill="#ffffff" opacity="0.5" />
      <circle cx="110" cy="250" r="0.5" fill="#ddebff" opacity="0.6" />
      <circle cx="210" cy="60" r="0.4" fill="#fff1f5" opacity="0.5" />
      <circle cx="380" cy="170" r="0.5" fill="#ffffff" opacity="0.4" />
      <circle cx="480" cy="290" r="0.4" fill="#ebf6ff" opacity="0.6" />
      <circle cx="670" cy="130" r="0.6" fill="#ffffff" opacity="0.3" />
    </g>
    
    <g id="star-layer3">
      <!-- Distant background dust / tiny stars -->
      <circle cx="10" cy="10" r="0.3" fill="#ffffff" opacity="0.3" />
      <circle cx="120" cy="170" r="0.2" fill="#ffffff" opacity="0.4" />
      <circle cx="280" cy="60" r="0.3" fill="#ffffff" opacity="0.2" />
      <circle cx="450" cy="250" r="0.2" fill="#ffffff" opacity="0.3" />
      <circle cx="550" cy="120" r="0.3" fill="#ffffff" opacity="0.4" />
      <circle cx="680" cy="20" r="0.2" fill="#ffffff" opacity="0.2" />
      <circle cx="760" cy="210" r="0.3" fill="#ffffff" opacity="0.3" />
      <circle cx="85" cy="100" r="0.2" fill="#eef7ff" opacity="0.4" />
      <circle cx="195" cy="280" r="0.3" fill="#ffffff" opacity="0.2" />
      <circle cx="325" cy="140" r="0.2" fill="#ffffff" opacity="0.3" />
      <circle cx="410" cy="70" r="0.3" fill="#xfffaf" opacity="0.4" />
      <circle cx="510" cy="190" r="0.2" fill="#ffffff" opacity="0.2" />
      <circle cx="630" cy="240" r="0.3" fill="#eaf5ff" opacity="0.3" />
      <circle cx="700" cy="160" r="0.2" fill="#ffffff" opacity="0.4" />
    </g>
  </defs>
  
  <!-- Outer Wrapper & Deep Space Background -->
  <rect class="bg" width="800" height="300" rx="6" ry="6" />

  <!-- Layer 1: Distant Slow Stars -->
  <g class="star-pan-3">
    <use href="#star-layer3" x="0" y="0" />
    <use href="#star-layer3" x="800" y="0" />
  </g>
  <!-- Layer 2: Mid-Range Stars -->
  <g class="star-pan-2">
    <use href="#star-layer2" x="0" y="0" />
    <use href="#star-layer2" x="800" y="0" />
  </g>
  <!-- Layer 3: Close Stars -->
  <g class="star-pan-1">
    <use href="#star-layer1" x="0" y="0" />
    <use href="#star-layer1" x="800" y="0" />
  </g>

  <!-- Top Layer: Clean Typography -->
  <text x="410" y="180" class="main-neon chyren">CHYREN</text>

  <!-- Ghost Signature: Hebrew Resh, lower chyren, latin y -->
  <text x="785" y="285" class="ghost-sig" direction="ltr" unicode-bidi="bidi-override">רωy</text>
  
</svg>
