# Chyren HuggingFace Dataset Manifest
# Curated, ordered queue of external knowledge datasets.
# Managed by: hf_queue_manager.py
# Signed: R.W.Ϝ.Y. — ARI Genesis pipeline
#
# Fields:
#   id:          Unique stable slug (primary key in dataset_queue table)
#   hf_repo:     HuggingFace dataset repository (org/name)
#   hf_subset:   Config/subset name — leave '' for datasets with no subsets
#   hf_split:    Which split to stream (default: train)
#   priority:    Lower number = processed first (1=highest, 100=lowest)
#   row_limit:   Max rows to ingest per run (prevents runaway storage/cost)
#   realm:       Qdrant collection / knowledge realm to write into
#   description: Human-readable purpose note

datasets:
  # ── Tier 1: High-quality factual knowledge ─────────────────────────────────

  - id: wikimedia-wikipedia-en-simple
    hf_repo: wikimedia/wikipedia
    hf_subset: "20231101.simple"
    hf_split: train
    priority: 10
    row_limit: 30000
    realm: knowledge_matrix
    description: "Simple English Wikipedia — concise, high-quality factual content"

  - id: wikimedia-wikipedia-en-full
    hf_repo: wikimedia/wikipedia
    hf_subset: "20231101.en"
    hf_split: train
    priority: 20
    row_limit: 50000
    realm: knowledge_matrix
    description: "Full English Wikipedia — broad world knowledge"

  - id: arxiv-abstracts-stem
    hf_repo: gfissore/arxiv-abstracts-2021
    hf_subset: ""
