[package]
name = "chyren-spokes"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false }
tokio = { version = "1", features = ["full"] }
futures = "0.3"
sqlx = { version = "0.8.6", features = ["postgres", "runtime-tokio-rustls", "macros"] }
urlencoding = "2.1.3"
sha2 = "0.10.8"
tracing = "0.1"
chyren-telemetry = { path = "../chyren-telemetry" }
chyren-core = { path = "../chyren-core" }
