name: Chyren CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- Medulla (Rust) ---
  medulla-ci:
    name: Medulla (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: medulla -> target
      - name: Check Format
        run: cd medulla && cargo fmt --all -- --check
      - name: Clippy Lint
        run: cd medulla && cargo clippy --workspace -- -D warnings
      - name: Run Tests
        run: cd medulla && cargo test --workspace

  # --- Cortex (Python) ---
  cortex-ci:
    name: Cortex (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd cortex
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/cortex
          pytest tests/

  # --- Web (Next.js) ---
  web-ci:
    name: Web Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: cd web && npm ci
      - name: Typecheck
        run: cd web && npm run typecheck
      - name: Lint
        run: cd web && npm run lint
      - name: Build
        run: cd web && npm run build
