name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: "Gitleaks — Secret Detection"
    runs-on: ubuntu-latest
    # NOTE: No continue-on-error — this job MUST pass before merge.
    permissions:
      contents: read
      # Required for gitleaks-action to post PR annotations
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Fetch full git history so gitleaks can scan every commit on the PR,
          # not just the tip. On push-to-main we still get the full log.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use our repo-level config so allowlists are respected
          GITLEAKS_CONFIG: .gitleaks.toml
          # Hard-fail: non-zero exit code blocks the workflow
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
