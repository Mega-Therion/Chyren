name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Medulla (Rust) ──────────────────────────────────────────────────────────
  medulla:
    name: "Medulla (Rust)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "medulla -> target"

      - name: cargo check
        run: cargo check --workspace
        working-directory: medulla

      - name: cargo test
        run: cargo test --workspace
        working-directory: medulla

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: medulla

      - name: cargo fmt
        run: cargo fmt --all -- --check
        working-directory: medulla

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  web:
    name: "Web (Next.js)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run typecheck
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          # generate-context.mjs skips gracefully when OMEGA_DB_URL is unset
          NEXT_PUBLIC_API_BASE_URL: https://placeholder.local

  # ── Gateway (Vite) ──────────────────────────────────────────────────────────
  gateway:
    name: "Gateway (Vite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: gateway/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: gateway

      - name: Type check
        run: npx tsc --noEmit
        working-directory: gateway

      - name: Lint
        run: pnpm lint
        working-directory: gateway

      - name: Build
        run: pnpm build
        working-directory: gateway

  # ── Cortex (Python) ─────────────────────────────────────────────────────────
  cortex:
    name: "Cortex (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cortex/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: cortex

      - name: Run tests
        # Exclude tests that require live network/API keys (Gemma, Ollama, etc.)
        run: |
          pytest tests/ -x -q \
            --ignore=tests/test_debug.py \
            --ignore=tests/test_gemma.py \
            --ignore=tests/test_gemma_debug.py \
            --ignore=tests/test_gemma_context_stress.py \
            --ignore=tests/test_identity.py
        env:
          PYTHONPATH: cortex
