name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Medulla (Rust) ──────────────────────────────────────────────────────────
  medulla:
    name: "Medulla (Rust)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "medulla -> target"

      - name: cargo check
        run: cargo check --workspace
        working-directory: medulla

      - name: cargo test
        run: cargo test --workspace
        working-directory: medulla

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: medulla

      - name: cargo fmt
        run: cargo fmt --all -- --check
        working-directory: medulla

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  web:
    name: "Web (Next.js)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run typecheck
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Run unit tests
        run: npm test
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          # generate-context.mjs skips gracefully when OMEGA_DB_URL is unset
          NEXT_PUBLIC_API_BASE_URL: https://placeholder.local

  # ── Gateway (Vite) ──────────────────────────────────────────────────────────
  gateway:
    name: "Gateway (Vite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: gateway/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: gateway

      - name: Type check
        run: npx tsc --noEmit
        working-directory: gateway

      - name: Lint
        run: pnpm lint
        working-directory: gateway

      - name: Build
        run: pnpm build
        working-directory: gateway

  # ── Cortex (Python) ─────────────────────────────────────────────────────────
  cortex:
    name: "Cortex (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cortex/requirements.txt

      - name: Syntax check dream-mode scripts
        run: |
          python -m py_compile cortex/chyren_py/identity_synthesis.py
          python -m py_compile cortex/ops/scripts/catalog_registrar.py
          python -m py_compile cortex/ops/scripts/ingest_all_sources.py

      - name: Run pytest (unit + smoke)
        run: pytest --tb=short
        # pytest.ini at repo root sets pythonpath=cortex and testpaths=tests
