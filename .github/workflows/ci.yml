name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Medulla (Rust) ──────────────────────────────────────────────────────────
  medulla:
    name: "Medulla (Rust)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core/chyren-os/kernel -> target"

      - name: cargo check
        run: cargo check --workspace
        working-directory: core/chyren-os/kernel

      - name: cargo test
        run: cargo test --workspace
        working-directory: core/chyren-os/kernel

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: core/chyren-os/kernel

      - name: cargo fmt
        run: cargo fmt --all -- --check
        working-directory: core/chyren-os/kernel

  # ── Cargo audit (security) ──────────────────────────────────────────────────
  cargo-audit:
    name: "cargo audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      # Fails CI on any unpatched advisory. Permanent ignores belong in
      # core/chyren-os/kernel/.cargo/audit.toml with a comment justifying each.
      - name: cargo audit
        run: cargo audit --deny warnings
        working-directory: core/chyren-os/kernel

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  web:
    name: "Web (Next.js)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: core/chyren-os/interface/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: core/chyren-os/interface

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        working-directory: core/chyren-os/interface

      - name: Type check
        run: npm run typecheck
        working-directory: core/chyren-os/interface

      - name: Lint
        run: npm run lint
        working-directory: core/chyren-os/interface

      - name: Run unit tests
        run: npm test
        working-directory: core/chyren-os/interface

      - name: Build
        run: npm run build
        working-directory: core/chyren-os/interface
        env:
          # generate-context.mjs skips gracefully when OMEGA_DB_URL is unset
          NEXT_PUBLIC_API_BASE_URL: https://placeholder.local

  # ── Gateway (Vite) ──────────────────────────────────────────────────────────
  gateway:
    name: "Gateway (Vite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: core/gateway/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: core/gateway

      - name: pnpm audit (high+)
        run: pnpm audit --audit-level high
        working-directory: core/gateway

      - name: Type check
        run: npx tsc --noEmit
        working-directory: core/gateway

      - name: Lint
        run: pnpm lint
        working-directory: core/gateway

      - name: Build
        run: pnpm build
        working-directory: core/gateway

  # ── Cortex (Python) ─────────────────────────────────────────────────────────
  cortex:
    name: "Cortex (Python)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r core/cortex/requirements.txt

      - name: Syntax check dream-mode scripts
        run: |
          python -m py_compile core/cortex/chyren_py/identity_synthesis.py
          python -m py_compile core/cortex/ops/scripts/catalog_registrar.py
          python -m py_compile core/cortex/ops/scripts/ingest_all_sources.py

      - name: Run pytest (unit + smoke)
        run: pytest --tb=short
        # pytest.ini at repo root sets pythonpath and testpaths

      - name: Merkle policy + skill verifier smoke
        run: |
          python -c "from core.cortex.merkle_policy.merkle_service import MerklePolicyService, merkle_root, inclusion_proof, verify_inclusion; \
                     import os; os.environ['CHYREN_POLICY_HMAC_KEY']='x'*32; \
                     s=MerklePolicyService(); m=s.generate_manifest(['a','b','c']); \
                     assert s.verify_manifest(m); \
                     p=inclusion_proof(['a','b','c'],1); \
                     assert verify_inclusion('b',p,m.root); \
                     print('merkle ok')"
